<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="抱歉，您要找的頁面不存在。請返回 SunnyYummy 首頁瀏覽我們的週邊商品。">
    <meta name="author" content="SunnyYummy">
    
    <title>頁面不存在 - SunnyYummy</title>
    
    <!-- 安全標頭 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Favicon 和圖示 -->
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="images/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="images/android-chrome-512x512.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    
    <link rel="stylesheet" href="index.css">
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 1rem;
        }
        .error-description {
            color: #666;
            margin-bottom: 2rem;
            max-width: 500px;
        }
        .back-home {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 25px;
            font-weight: 500;
            transition: transform 0.3s ease;
        }
        .back-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>

<body>
    <!-- 導航欄 -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">🎵 SunnyYummy & 吃貨們</h1>
        </div>
    </nav>

    <!-- 錯誤頁面內容 -->
    <main class="main-content">
        <div class="error-page">
            <div class="error-code">404</div>
            <h1 class="error-message">頁面不存在</h1>
            <p class="error-description">
                抱歉，您要找的頁面不存在或已被移除。<br>
                請檢查網址是否正確，或返回首頁瀏覽我們的商品。
            </p>
            <a href="/" class="back-home">返回首頁</a>
        </div>
    </main>

    <!-- 頁腳資訊 -->
    <div class="footer-info">
        <p>© 2023 SunnyYummy. All rights reserved.</p>
        <p>信箱：paulaqueenatina@gmail.com</p>
        <p>客服時間：週一～週五 08:00～17:00</p>
    </div>

    <!-- 底部導航 -->
    <footer class="bottom-nav">
        <div class="bottom-nav-container">
            <a href="/" class="bottom-nav-item">
                <div class="nav-icon">
                    <img src="images/footicon_store.png" alt="週邊商品" class="nav-icon-img" onerror="this.style.display='none'; this.parentNode.innerHTML='🛒';">
                </div>
                <span>週邊商品</span>
            </a>
            <a href="music.html" class="bottom-nav-item">
                <div class="nav-icon">
                    <img src="images/footicon_music.png" alt="音樂" class="nav-icon-img" onerror="this.style.display='none'; this.parentNode.innerHTML='🎵';">
                </div>
                <span>音樂</span>
            </a>
            <a href="scores.html" class="bottom-nav-item">
                <div class="nav-icon">
                    <img src="images/footicon_score.png" alt="樂譜" class="nav-icon-img" onerror="this.style.display='none'; this.parentNode.innerHTML='🎼';">
                </div>
                <span>樂譜</span>
            </a>
        </div>
    </footer>
</body>

</html>
